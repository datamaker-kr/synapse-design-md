name: check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Unit tests (governance + sync round-trip)
        run: npm test

      - name: synapse-design-md check (Google DESIGN.md lint + structure)
        run: node ./bin/synapse-design-md.js check --strict
